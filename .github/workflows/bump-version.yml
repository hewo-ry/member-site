---
name: Bump version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Select type
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Bump version
        id: bump-version
        run: |
          VERSION=$(npm version ${{ github.event.inputs.bump_type }} --no-git-tag-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "Release ${{ steps.bump-version.outputs.version }}"
          branch: "release-${{ steps.bump-version.outputs.version}}"
          title: "Release ${{ steps.bump-version.outputs.version }}"
          body: "Create new ${{ github.event.inputs.bump_type }} release: ${{
            steps.bump-version.outputs.version }}"
          sign-commits: true
          assignees: ${{ github.actor }}
