---
name: Create new release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Select type
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  bump-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      version: ${{ steps.bump-version.outputs.version }}

    steps:
      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: github-app
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24

      - name: Bump version
        id: bump-version
        run: |
          VERSION=$(npm version ${{ github.event.inputs.bump_type }} --no-git-tag-version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verified Bot Commit
        id: bot-commit
        uses: iarekylew00t/verified-bot-commit@v2.3.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          message: 'chore: bump version to ${{ steps.bump-version.outputs.version }}'
          files: |
            package.json

      - name: Create Verified Tag
        uses: actions/github-script@v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.bump-version.outputs.version }}',
              sha: '${{ steps.bot-commit.outputs.commit }}'
            });

  build:
    runs-on: ${{ matrix.runner }}

    needs: bump-version

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        organization:
          - pmty
          - hewo
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Prepare platform slug
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.organization }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          build-args: |
            ORG_THEME=${{ matrix.organization }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.organization }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.organization }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.organization }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digests-${{ matrix.organization }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-push:
    runs-on: ubuntu-latest

    needs:
      - bump-version
      - build

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        organization:
          - pmty
          - hewo

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.organization }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.organization }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.bump-version.outputs.version }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.organization }}@sha256:%s ' *)
